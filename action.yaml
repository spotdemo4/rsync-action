name: rsync action
description: Pull from an rsync daemon before a step and push changes back afterward
author: trev

inputs:
  server:
    description: rsync daemon host, optionally including a port as host:port
    required: true
  module:
    description: rsync daemon module name
    required: true
  remote-path:
    description: Path inside the rsync daemon module. Rsync trailing slash semantics are preserved.
    required: false
    default: ""
  local-path:
    description: Local file or directory path to sync. Rsync trailing slash semantics are preserved.
    required: true
  secret:
    description: rsync daemon credentials in username:password format
    required: true
  tls:
    description: Use TLS for an rsync daemon
    required: false
    default: "true"
  rsync-args:
    description: Newline-separated rsync arguments used for both pull and push
    required: false
    default: --archive

runs:
  using: node24
  main: build/index.js
  post: build/index.js
  post-if: always()
